<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☁️ تخزيني - Cloudinary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .upload-area {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .upload-btn {
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.3em;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(17,153,142,0.4);
        }
        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(17,153,142,0.5);
        }
        #fileInput { display: none; }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .preview-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .preview-card img, .preview-card video {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-body {
            padding: 20px;
        }
        .link-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .link-row input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 12px;
            direction: ltr;
        }
        .copy-btn {
            padding: 10px 20px;
            background: #11998e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .copy-btn:hover { background: #0d7a6e; }
        .copy-btn.copied { background: #38ef7d; }
        .progress-ring {
            display: none;
            margin: 20px auto;
            width: 60px;
            height: 60px;
            border: 5px solid #e0e0e0;
            border-top-color: #11998e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #38ef7d;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s;
            font-weight: bold;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ تخزيني - Cloudinary</h1>
        
        <div class="upload-area">
            <label class="upload-btn" for="fileInput">
                📤 اختر الملفات للرفع
            </label>
            <input type="file" id="fileInput" accept="image/*,video/*" multiple>
            <p style="margin-top: 15px; color: #666;">أو اسحب الملفات هنا</p>
            <div class="progress-ring" id="loader"></div>
        </div>

        <div class="preview-grid" id="previewGrid"></div>
    </div>

    <div class="toast" id="toast">✅ تم النسخ!</div>

    <script>
        // ⚠️ ضع بيانات Cloudinary هنا
        const CLOUD_NAME = 'dbic9mpi7';
        const UPLOAD_PRESET = 'media_upload'; // أنشئه من الإعدادات
        
        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('previewGrid');
        const loader = document.getElementById('loader');

        fileInput.addEventListener('change', handleFiles);

        // Drag & Drop
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => {
            e.preventDefault();
            handleFiles({ target: { files: e.dataTransfer.files } });
        });

        async function handleFiles(e) {
            const files = Array.from(e.target.files);
            loader.style.display = 'block';
            
            for (let file of files) {
                await uploadToCloudinary(file);
            }
            
            loader.style.display = 'none';
            fileInput.value = '';
        }

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            
            try {
                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,
                    { method: 'POST', body: formData }
                );
                
                const data = await response.json();
                
                if (data.secure_url) {
                    addPreviewCard(data.secure_url, file.name, data.resource_type);
                }
            } catch (err) {
                alert('❌ خطأ في الرفع: ' + err.message);
            }
        }

        function addPreviewCard(url, name, type) {
            const card = document.createElement('div');
            card.className = 'preview-card';
            
            const media = type === 'video' 
                ? `<video src="${url}" controls></video>`
                : `<img src="${url}" alt="${name}" loading="lazy">`;
            
            card.innerHTML = `
                ${media}
                <div class="card-body">
                    <p style="font-size: 13px; color: #666; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis;">${name}</p>
                    <div class="link-row">
                        <input type="text" value="${url}" readonly id="link-${Date.now()}">
                        <button class="copy-btn" onclick="copyLink(this, '${url}')">نسخ</button>
                    </div>
                </div>
            `;
            
            previewGrid.insertBefore(card, previewGrid.firstChild);
        }

        function copyLink(btn, url) {
            navigator.clipboard.writeText(url);
            btn.textContent = '✅ تم!';
            btn.classList.add('copied');
            showToast('✅ تم نسخ الرابط!');
            
            setTimeout(() => {
                btn.textContent = 'نسخ';
                btn.classList.remove('copied');
            }, 2000);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
