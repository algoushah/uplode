<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☁️ تخزيني - Imgur</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .main-card {
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.2);
        }
        .drop-area {
            border: 4px dashed #ff6b6b;
            border-radius: 20px;
            padding: 80px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #fff5f5 0%, #fffbeb 100%);
        }
        .drop-area:hover, .drop-area.dragover {
            border-color: #feca57;
            background: linear-gradient(135deg, #fff0f0 0%, #fff5e6 100%);
            transform: scale(1.02);
        }
        .drop-area .icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }
        .drop-area h2 { color: #333; margin-bottom: 10px; }
        .drop-area p { color: #666; }
        #fileInput { display: none; }
        
        .uploading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .uploading .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #ffe0e0;
            border-top-color: #ff6b6b;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .result {
            display: none;
            background: #f0fff4;
            border: 2px solid #48bb78;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        .result h3 { color: #48bb78; margin-bottom: 15px; }
        .link-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .link-container input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            direction: ltr;
            background: white;
        }
        .action-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .copy-btn { background: #ff6b6b; color: white; }
        .copy-btn:hover { background: #ee5a5a; }
        .open-btn { background: #feca57; color: #333; }
        .open-btn:hover { background: #f0b90b; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }
        .item:hover { transform: translateY(-5px); }
        .item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .item-info {
            padding: 15px;
        }
        .item-info button {
            width: 100%;
            padding: 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .item-info button:hover { background: #ee5a5a; }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #48bb78;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ تخزيني - Imgur</h1>
        
        <div class="main-card">
            <div class="drop-area" id="dropArea">
                <span class="icon">📸</span>
                <h2>ارفع صورتك أو فيديوك</h2>
                <p>اسحب الملف هنا أو اضغط للاختيار</p>
            </div>
            <input type="file" id="fileInput" accept="image/*,video/*">
            
            <div class="uploading" id="uploading">
                <div class="spinner"></div>
                <h3>⏳ جاري الرفع إلى Imgur...</h3>
            </div>
            
            <div class="result" id="result">
                <h3>🎉 تم الرفع بنجاح!</h3>
                <div class="link-container">
                    <input type="text" id="linkInput" readonly>
                    <button class="action-btn copy-btn" onclick="copyLink()">📋 نسخ</button>
                </div>
                <div class="link-container">
                    <input type="text" id="directInput" readonly placeholder="رابط مباشر...">
                    <button class="action-btn copy-btn" onclick="copyDirect()">📋 نسخ مباشر</button>
                    <button class="action-btn open-btn" onclick="openLink()">🔗 فتح</button>
                </div>
            </div>
        </div>

        <div class="gallery" id="gallery"></div>
    </div>

    <div class="toast" id="toast">✅ تم النسخ!</div>

    <script>
        // ⚠️ اختياري: ضع Client ID من Imgur (أو استخدمه بدون)
        const CLIENT_ID = 'your-client-id'; // اختياري - يمكن الرفع بدونه
        
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const uploading = document.getElementById('uploading');
        const result = document.getElementById('result');
        const linkInput = document.getElementById('linkInput');
        const directInput = document.getElementById('directInput');
        const gallery = document.getElementById('gallery');

        // Drag & Drop
        dropArea.addEventListener('click', () => fileInput.click());
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('dragover');
        });
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) uploadFile(e.target.files[0]);
        });

        async function uploadFile(file) {
            uploading.style.display = 'block';
            result.style.display = 'none';
            
            const formData = new FormData();
            formData.append('image', file);
            
            const headers = CLIENT_ID !== 'your-client-id' 
                ? { 'Authorization': `Client-ID ${CLIENT_ID}` }
                : {};
            
            try {
                const response = await fetch('https://api.imgur.com/3/image', {
                    method: 'POST',
                    headers: headers,
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    linkInput.value = data.data.link;
                    directInput.value = data.data.link;
                    result.style.display = 'block';
                    
                    addToGallery(data.data.link, file.name);
                    showToast('✅ تم الرفع بنجاح!');
                } else {
                    throw new Error('فشل الرفع');
                }
            } catch (err) {
                // بدون Client ID قد يحتاج CORS proxy
                alert('❌ خطأ: جرب تسجيل Client ID من Imgur أو استخدم الخيار الأول/الثاني');
            } finally {
                uploading.style.display = 'none';
            }
        }

        function addToGallery(url, name) {
            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = `
                <img src="${url}" alt="${name}" loading="lazy">
                <div class="item-info">
                    <p style="font-size: 12px; color: #666; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis;">${name}</p>
                    <button onclick="copyGalleryLink('${url}')">📋 نسخ الرابط</button>
                </div>
            `;
            gallery.insertBefore(item, gallery.firstChild);
        }

        function copyLink() {
            navigator.clipboard.writeText(linkInput.value);
            showToast('✅ تم نسخ الرابط!');
        }

        function copyDirect() {
            navigator.clipboard.writeText(directInput.value);
            showToast('✅ تم نسخ الرابط المباشر!');
        }

        function copyGalleryLink(url) {
            navigator.clipboard.writeText(url);
            showToast('✅ تم النسخ!');
        }

        function openLink() {
            window.open(linkInput.value, '_blank');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
